# Override for one-off knowledge-base ingestion — team-only, never used for
# the submitted solution. Swaps the lightweight runtime `pyworker` (embed +
# rerank, CPU) for the heavy ingestion tool (Docling/OCR + embed + rerank,
# ROCm-accelerated) so the api container's /v1/documents ingest path has
# somewhere to send large books.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ingestion.yml up -d --build
#   ./scripts/seed_corpus.sh
#   docker compose -f docker-compose.yml -f docker-compose.ingestion.yml exec postgres \
#     pg_dump -U postgres hypothesis_factory > db/hypothesis_factory.dump.sql
#   docker compose -f docker-compose.yml -f docker-compose.ingestion.yml down
#   # then submit/demo with plain `docker compose up` (light pyworker, dump restored on init)
services:
  pyworker:
    build: ./tools/ingestion
    devices:
      - /dev/kfd
      - /dev/dri/renderD128
    group_add:
      - render
    environment:
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
      GROBID_URL: http://grobid:8070
      # Docling/EasyOCR page-by-page OCR over a long scanned book leaves the
      # HIP caching allocator fragmented (small blocks reserved-but-unusable
      # for the next page's slightly different tensor shape) until an
      # allocation that would easily fit fails anyway ("Tried to allocate
      # 52.00 MiB ... 26.00 MiB is free" after 11.64GiB accumulated across a
      # single 151-page document). This is PyTorch's own suggested fix in
      # that exact error message.
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      PYTORCH_HIP_ALLOC_CONF: "expandable_segments:True"
    depends_on:
      grobid:
        condition: service_healthy

  # Scientific-paper structure parser (title/authors/abstract/sections,
  # citation-aware) — used only by POST /ingest-article, for real academic
  # PDFs the team brings in. Books/regulations/schemes still go through
  # Docling via /ingest; GROBID is tuned for paper layout, not textbooks.
  grobid:
    image: grobid/grobid:0.8.1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8070/api/isalive || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
