services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hypothesis_factory
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pyworker:
    build: ./services/pyworker
    ports:
      - "8090:8090"
    volumes:
      - hf-cache:/root/.cache/huggingface
    # First request downloads BGE-M3 / bge-reranker-v2-m3 / Docling models — cached afterwards.

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      pyworker:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/hypothesis_factory?sslmode=disable
      WORKER_BASE_URL: http://pyworker:8090
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}

volumes:
  pgdata:
  hf-cache:
