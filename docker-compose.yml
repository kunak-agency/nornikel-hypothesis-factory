services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hypothesis_factory
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Схема создаётся не отсюда, а Repos.MigrateDB() при старте api
    # (AutoMigrate по доменным моделям + raw SQL для pgvector/tsvector/HNSW).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Runtime-only sidecar (embed query + rerank top-K) — no Docling/OCR, no GPU
  # requirement. Ingestion (heavy, one-off) is a separate tool/compose file
  # (tools/ingestion/, docker-compose.ingestion.yml) never part of this stack —
  # the submitted solution ships with a pre-built Postgres dump, not a
  # from-scratch document parser.
  pyworker:
    build: ./services/pyworker
    ports:
      - "8090:8090"
    volumes:
      - hf-cache:/root/.cache/huggingface
    # First request downloads BGE-M3 / bge-reranker-v2-m3 — cached afterwards.

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      pyworker:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/hypothesis_factory?sslmode=disable
      WORKER_BASE_URL: http://pyworker:8090
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}

volumes:
  pgdata:
  hf-cache:
