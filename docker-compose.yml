services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      # Port 5435 is exposed directly to the internet on the deployed VM, so the
      # default password must be overridable. Set POSTGRES_PASSWORD in .env on
      # any public deployment; local dev falls back to `postgres`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: hypothesis_factory
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Готовый дамп базы знаний: postgres-образ выполняет db/*.sql.gz
      # ТОЛЬКО при первом старте с пустым volume — свежий `docker compose up`
      # поднимается сразу с наполненным корпусом, существующие volume'ы дамп
      # не перетирает. Монтируется каталог, а не файл: без дампа (он не в
      # git, поставляется с материалами сдачи — см. db/README.md) стек всё
      # равно поднимается, просто с пустой базой. Остальная схема доводится
      # Repos.MigrateDB() при старте api.
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Runtime-only sidecar (embed query + rerank top-K) — no Docling/OCR, no GPU
  # requirement. Ingestion (heavy, one-off) is a separate tool/compose file
  # (tools/ingestion/, docker-compose.ingestion.yml) never part of this stack —
  # the submitted solution ships with a pre-built Postgres dump, not a
  # from-scratch document parser.
  pyworker:
    build: ./services/pyworker
    ports:
      - "8090:8090"
    # Models (BGE-M3 / bge-reranker-v2-m3) are baked into the image at build
    # time and eager-loaded at startup — no runtime HuggingFace download, no
    # first-request "прогрев". The old hf-cache volume is gone: nothing to warm.

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      pyworker:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/hypothesis_factory?sslmode=disable
      WORKER_BASE_URL: http://pyworker:8090
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}

volumes:
  pgdata:
